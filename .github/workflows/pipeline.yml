name: NYC Taxi Pipeline

# Étape 2/4 — environnement Python reproductible (uv).
# On récupère le code, on installe uv, puis on synchronise les dépendances
# verrouillées (uv.lock). Snowflake / ingestion / dbt viendront aux étapes suivantes.

on:
  push:
    branches: [feat/ci]   # se déclenche à chaque push sur la branche de construction de la CI
  workflow_dispatch:        # + lancement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v5

      - name: Installer les dépendances (verrouillées)
        run: uv sync

      - name: Vérifier l'environnement
        run: |
          uv --version
          uv run python --version
          uv run dbt --version
