name: Release

# Étape 5a — squelette. Se déclenche au push d'un tag SemVer `v*` (ex: v1.0.0).
# On valide d'abord que le déclencheur fonctionne ; la création de la GitHub
# Release (gh release create) viendra en 5b.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Annoncer le tag
        run: echo "Release déclenchée pour le tag ${{ github.ref_name }} (étape 5a OK)."
